# Update package versions under cBioPortal/cbioportal-frontend/packages directory and push to master
name: update-cbioportal-frontend-package-version

on:
  repository_dispatch:
    types: [cbioportal-frontend-package-update]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.LERNA_PUBLISH_BOT_GITHUB_TOKEN }}
          repository: cBioPortal/cbioportal-frontend
      # lerna needs tags to be able to determine what's changed
      - run: git fetch origin +refs/tags/*:refs/tags/*
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          registry-url: 'https://registry.npmjs.org'
      - run: yarn policies set-version 1.22.22
      - run: yarn --frozen-lockfile
      - run: yarn updatePackageVersion
      - name: Commit and push version changes to master
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update package versions"
          git push origin HEAD:master
