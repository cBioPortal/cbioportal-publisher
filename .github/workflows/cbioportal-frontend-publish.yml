# Publish modules under cBioPortal/cbioportal-frontend/packages directory to npm registry
name: cBioPortal Frontend Module Publish

on:
  repository_dispatch:
    types: [cbioportal-frontend-package-update]
  workflow_dispatch:
    inputs:
      skip_version_update:
        description: 'Skip yarn updatePackageVersion step (publish packages as-is without patching version)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.LERNA_PUBLISH_BOT_GITHUB_TOKEN }}
          repository: cBioPortal/cbioportal-frontend
      # lerna needs tags to be able to determine what's changed
      - run: git fetch origin +refs/tags/*:refs/tags/*
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          registry-url: 'https://registry.npmjs.org'
      - run: yarn policies set-version 1.22.22
      - run: yarn --frozen-lockfile
      - run: yarn updatePackageVersion
        if: ${{ !inputs.skip_version_update }}
      - run: yarn buildModules
      # Normal publish: uses lerna publish from-git (requires version tags)
      - run: yarn publishModules
        if: ${{ !inputs.skip_version_update }}
        env:
          NPM_CONFIG_PROVENANCE: 'true'
      # Workaround publish: uses lerna publish from-package (compares local versions against npm registry, no tags needed)
      # Provenance is disabled because the packages declare repository.url pointing to cbioportal-frontend,
      # which would fail sigstore verification when the workflow runs in cbioportal-publisher.
      # env -u completely unsets GITHUB_ACTIONS and the OIDC vars from the child process so that neither lerna
      # nor npm can auto-detect the GitHub Actions OIDC endpoint and enable provenance. GITHUB_ACTIONS must also
      # be removed because lerna v9 enters its OIDC code path whenever GITHUB_ACTIONS=true — even when
      # ACTIONS_ID_TOKEN_REQUEST_URL is absent — causing it to fetch "undefined" as the token URL and fail with E404.
      # CI=true (still present) keeps lerna in CI mode (skips interactive prompts, etc.).
      - run: env -u ACTIONS_ID_TOKEN_REQUEST_URL -u ACTIONS_ID_TOKEN_REQUEST_TOKEN -u GITHUB_ACTIONS npx lerna publish from-package --yes --concurrency 1
        if: ${{ inputs.skip_version_update }}
        env:
          NPM_CONFIG_PROVENANCE: 'false'
